name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Setup project
        run: |
          flutter create --org com.jalanjakarta tmpapp
          cp -r jalan_jakarta/lib tmpapp/
          mkdir -p tmpapp/assets
          cp jalan_jakarta/pubspec.yaml tmpapp/pubspec.yaml
          cd tmpapp && flutter pub get

      - name: Fix Android config
        run: |
          python3 - << 'PYEOF'
          import re

          # 修复 build.gradle - 统一 kotlin 版本为 1.9.22
          with open('tmpapp/android/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(
              r"ext\.kotlin_version\s*=\s*'[^']+'",
              "ext.kotlin_version = '1.9.22'",
              content
          )
          with open('tmpapp/android/build.gradle', 'w') as f:
              f.write(content)
          print("=== build.gradle ===")
          print(content)

          # 修复 app/build.gradle
          with open('tmpapp/android/app/build.gradle', 'r') as f:
              content = f.read()

          # 修复 minSdkVersion
          content = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 21', content)

          # 关键：删掉手动写死的 kotlin-stdlib 依赖行，避免版本冲突
          content = re.sub(
              r"\s*implementation\s+['\"]org\.jetbrains\.kotlin:kotlin-stdlib[^'\"]*['\"]",
              '',
              content
          )

          with open('tmpapp/android/app/build.gradle', 'w') as f:
              f.write(content)
          print("=== app/build.gradle ===")
          print(content)

          PYEOF

      - name: Build APK
        working-directory: tmpapp
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JalanJakarta-APK
          path: tmpapp/build/app/outputs/flutter-apk/app-debug.apk
