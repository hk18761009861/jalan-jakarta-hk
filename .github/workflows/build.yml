name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Setup and build
        run: |
          flutter create --org com.jalanjakarta tmpapp
          cp -r jalan_jakarta/lib tmpapp/
          mkdir -p tmpapp/assets
          cp jalan_jakarta/pubspec.yaml tmpapp/pubspec.yaml

          # 强制写入正确的 build.gradle（app级别）
          cat > tmpapp/android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.jalanjakarta.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
          }
          EOF

          # 强制写入正确的 build.gradle（项目级别）
          cat > tmpapp/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cd tmpapp
          flutter pub get

      - name: Build APK
        working-directory: tmpapp
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JalanJakarta-APK
          path: tmpapp/build/app/outputs/flutter-apk/app-debug.apk
