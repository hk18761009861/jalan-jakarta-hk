name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Setup project
        run: |
          flutter create --org com.jalanjakarta tmpapp
          cp -r jalan_jakarta/lib tmpapp/
          mkdir -p tmpapp/assets
          cp jalan_jakarta/pubspec.yaml tmpapp/pubspec.yaml
          cd tmpapp && flutter pub get

      - name: Overwrite Android config
        run: |
          # 完全覆盖 build.gradle
          cat > tmpapp/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.22"
                  }
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 完全覆盖 app/build.gradle
          cat > tmpapp/android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          assert flutterRoot != null, "Flutter SDK not found. Define location with flutter.sdk in the local.properties file."

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }

          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }

          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "com.jalanjakarta.app"
              compileSdkVersion 34
              ndkVersion "25.1.8937393"

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.jalanjakarta.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              implementation 'androidx.multidex:multidex:2.0.1'
          }
          EOF

          # 清除 Gradle 缓存中的旧 kotlin transforms
          rm -rf ~/.gradle/caches/transforms-3/

      - name: Build APK
        working-directory: tmpapp
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JalanJakarta-APK
          path: tmpapp/build/app/outputs/flutter-apk/app-debug.apk
