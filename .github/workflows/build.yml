name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Setup project
        run: |
          flutter create --org com.jalanjakarta tmpapp
          cp -r jalan_jakarta/lib tmpapp/
          mkdir -p tmpapp/assets
          cp jalan_jakarta/pubspec.yaml tmpapp/pubspec.yaml
          cd tmpapp && flutter pub get

      - name: Build APK
        working-directory: tmpapp
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JalanJakarta-APK
          path: tmpapp/build/app/outputs/flutter-apk/app-debug.apk
