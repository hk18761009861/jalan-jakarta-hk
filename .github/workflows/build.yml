name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Setup and build
        run: |
          flutter create --org com.jalanjakarta tmpapp
          cp -r jalan_jakarta/lib tmpapp/
          mkdir -p tmpapp/assets
          cp jalan_jakarta/pubspec.yaml tmpapp/pubspec.yaml
          sed -i 's/minSdkVersion 16/minSdkVersion 21/' tmpapp/android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' tmpapp/android/app/build.gradle
          sed -i "s/ext.kotlin_version = '1.7.10'/ext.kotlin_version = '1.9.0'/" tmpapp/android/build.gradle
          sed -i "s/ext.kotlin_version = '1.8.10'/ext.kotlin_version = '1.9.0'/" tmpapp/android/build.gradle
          sed -i "s/ext.kotlin_version = '1.8.20'/ext.kotlin_version = '1.9.0'/" tmpapp/android/build.gradle
          sed -i "s/ext.kotlin_version = '1.8.22'/ext.kotlin_version = '1.9.0'/" tmpapp/android/build.gradle
          cd tmpapp
          flutter pub get

      - name: Build APK
        working-directory: tmpapp
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JalanJakarta-APK
          path: tmpapp/build/app/outputs/flutter-apk/app-debug.apk
