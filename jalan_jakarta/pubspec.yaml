name: jalan_jakarta
description: Discover the best of Jakarta - food, entertainment, shopping & more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  http: ^1.2.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  go_router: ^13.2.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.6
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
